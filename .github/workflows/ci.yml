name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade "pip>=25.3,<26" setuptools wheel
          python -m pip install -e .
          python -m pip install \
            pytest \
            "pip-audit>=2.10.1,<2.11" \
            "filelock>=3.20.3,<4"
      - name: Audit Python dependencies
        run: pip-audit .
      - name: Check Python dependency compatibility
        run: python -m pip check
      - name: Check shell scripts
        run: |
          bash -n ./launcher.sh
          bash -n ./git-watch.sh
          bash -n ./ops/configure_api_proxy.sh
      - name: Run tests
        run: python -m pytest
